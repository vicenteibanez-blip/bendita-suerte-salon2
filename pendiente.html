<!doctype html>
<html lang="es-CL">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pago pendiente · Bendita Suerte Salón</title>
<meta name="robots" content="noindex, follow" />
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" />
<link rel="stylesheet" href="styles.css?v=20260715" />
<style>
  .payment-result-page { padding-top: calc(var(--nav-h) + 4rem); padding-bottom: 6rem; max-width: 560px; margin-inline: auto; text-align: center; }
  .payment-result-page .icon-wrap { width: 84px; height: 84px; border-radius: 999px; background: #fdf1da; color: var(--gold); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
  .payment-result-page .icon-wrap svg { width: 40px; height: 40px; }
  .payment-result-page h1 { margin-top: .5rem; }
  .payment-result-page p { color: var(--ink-mute); margin-top: .9rem; line-height: 1.6; }
  .payment-result-page .actions { margin-top: 2rem; display: flex; gap: .8rem; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>
<a class="skip-link" href="#main">Saltar al contenido</a>
<main id="main" class="container payment-result-page">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
  </div>
  <h1>Tu pago está pendiente de confirmación</h1>
  <p>Esto puede pasar con algunos medios de pago (como transferencia). Te avisaremos apenas se confirme. Si tienes dudas, escríbenos por WhatsApp.</p>
  <div class="actions">
    <a class="btn btn-primary" href="index.html">Volver al inicio</a>
    <a class="btn btn-light" data-bind-href="whatsapp" href="#" target="_blank" rel="noopener">Escribir por WhatsApp</a>
  </div>
</main>
<script defer src="lib/manifest.js?v=20260703"></script>
<script defer>
  (function () {
    function ready(fn) { document.readyState !== "loading" ? fn() : document.addEventListener("DOMContentLoaded", fn); }
    ready(function () {
      var data = window.__BRAND__;
      if (data) {
        var waBase = "https://wa.me/" + data.whatsappNumber + "?text=" + encodeURIComponent("Hola Bendita Suerte, mi pago quedó pendiente, ¿me pueden confirmar?");
        document.querySelectorAll('[data-bind-href="whatsapp"]').forEach(function (el) { el.setAttribute("href", waBase); });
      }
    });
  })();
</script>
</body>
</html>
