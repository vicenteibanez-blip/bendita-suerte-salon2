<!doctype html>
<html lang="es-CL">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>¡Compra exitosa! · Bendita Suerte Salón</title>
<meta name="robots" content="noindex, follow" />
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" />
<link rel="stylesheet" href="styles.css?v=20260715" />
<style>
  .payment-result-page { padding-top: calc(var(--nav-h) + 4rem); padding-bottom: 6rem; max-width: 560px; margin-inline: auto; text-align: center; }
  .payment-result-page .icon-wrap { width: 84px; height: 84px; border-radius: 999px; background: var(--accent-tint); color: var(--accent-strong); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
  .payment-result-page .icon-wrap svg { width: 40px; height: 40px; }
  .payment-result-page h1 { margin-top: .5rem; }
  .payment-result-page p { color: var(--ink-mute); margin-top: .9rem; line-height: 1.6; }
  .payment-result-page .ref { font-size: .82rem; color: var(--ink-mute); margin-top: 1.5rem; }
  .payment-result-page .actions { margin-top: 2rem; display: flex; gap: .8rem; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>
<a class="skip-link" href="#main">Saltar al contenido</a>
<main id="main" class="container payment-result-page">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
  </div>
  <h1>¡Gracias por tu compra!</h1>
  <p>Tu pago fue aprobado. Estamos preparando tu pedido y nos pondremos en contacto contigo para coordinar la entrega o el retiro en local.</p>
  <p class="ref" data-payment-ref></p>
  <div class="actions">
    <a class="btn btn-primary" href="index.html">Volver al inicio</a>
    <a class="btn btn-light" data-bind-href="whatsapp" href="#" target="_blank" rel="noopener">Escribir por WhatsApp</a>
  </div>
</main>
<script defer src="lib/manifest.js?v=20260703"></script>
<script defer>
  (function () {
    function ready(fn) { document.readyState !== "loading" ? fn() : document.addEventListener("DOMContentLoaded", fn); }
    ready(function () {
      // El pago fue exitoso: vaciamos el carrito guardado localmente.
      try { localStorage.removeItem("bs_cart"); } catch (e) { /* privacy mode: ignore */ }

      // Vincular WhatsApp igual que en el resto del sitio (usa window.__BRAND__ de manifest.js).
      var data = window.__BRAND__;
      if (data) {
        var waBase = "https://wa.me/" + data.whatsappNumber + "?text=" + encodeURIComponent("Hola Bendita Suerte, acabo de realizar una compra online 🍀");
        document.querySelectorAll('[data-bind-href="whatsapp"]').forEach(function (el) { el.setAttribute("href", waBase); });
      }

      // Mostrar el ID de pago de MercadoPago si viene en la URL (referencia para el cliente).
      var params = new URLSearchParams(window.location.search);
      var paymentId = params.get("payment_id") || params.get("collection_id");
      var refEl = document.querySelector("[data-payment-ref]");
      if (refEl && paymentId) { refEl.textContent = "N° de operación MercadoPago: " + paymentId; }
    });
  })();
</script>
</body>
</html>
